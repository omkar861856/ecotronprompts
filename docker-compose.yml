services:
  mongodb:
    image: mongo:latest
    container_name: promptlib-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  minio:
    image: minio/minio:latest
    container_name: promptlib-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"

  redis:
    image: redis:7-alpine
    container_name: promptlib-redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: promptlib-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: promptlib-crawl4ai
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_KEY=optional_key

volumes:
  mongodb_data:
  minio_data:
  ollama_data:
