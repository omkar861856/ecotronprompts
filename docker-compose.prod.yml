services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    container_name: ecotron-web
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_URI=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - UPLOAD_DIR=/app/uploads
      - NEXT_PUBLIC_BASE_URL=https://ecotron.co.in
    volumes:
      - prompt_uploads:/app/uploads
    depends_on:
      - mongodb
      - redis
      - ollama

  mongodb:
    image: mongo:latest
    container_name: ecotron-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}

  redis:
    image: redis:alpine
    container_name: ecotron-redis
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ecotron-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama

  caddy:
    image: caddy:latest
    container_name: ecotron-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - prompt_uploads:/app/uploads
    depends_on:
      - web

volumes:
  mongodb_data:
  ollama_data:
  caddy_data:
  caddy_config:
  prompt_uploads:
