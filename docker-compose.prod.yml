services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecotron-web
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      - mongodb
      - redis
      - ollama

  mongodb:
    image: mongo:latest
    container_name: ecotron-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}

  redis:
    image: redis:7-alpine
    container_name: ecotron-redis
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ecotron-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama

  init-ollama:
    image: curlimages/curl:latest
    container_name: ecotron-init-ollama
    depends_on:
      - ollama
    command: >
      sh -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}'"

  caddy:
    image: caddy:latest
    container_name: ecotron-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  mongodb_data:
  ollama_data:
  caddy_data:
  caddy_config:
